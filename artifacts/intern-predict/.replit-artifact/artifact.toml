kind = "web"
previewPath = "/"
title = "InternPredict AI"
version = "1.0.0"
id = "artifacts/intern-predict"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25525

[services.development]
run = "pnpm --filter @workspace/intern-predict run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/intern-predict", "run", "build" ]
publicDir = "artifacts/intern-predict/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25525"
BASE_PATH = "/"
